steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mstool-ai-qms'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      # CPU is throttled when idle (cheaper than always-allocated). With
      # min-instances=0 + cpu-throttling, idle Cloud Run cost is ~$0.
      - '--cpu-throttling'
      - '--max-instances'
      - '2'
      # SCALE TO ZERO. Cloud Scheduler hits /api/v1/cron/* endpoints to
      # wake the service when needed. APScheduler is INTENTIONALLY OFF
      # in production so we don't need a 24/7 instance. Net savings:
      # ~$45/month vs min-instances=1.
      - '--min-instances'
      - '0'
      # Slightly higher concurrency saves on per-request CPU billing.
      - '--concurrency'
      - '40'
      # IMPORTANT: --update-env-vars preserves any env vars set out-of-band
      # (e.g. ANTHROPIC_API_KEY configured via `gcloud run services update`),
      # which --set-env-vars would silently delete. Bug we shipped twice
      # before finding it — never go back to --set-env-vars here.
      # IMPORTANT: --update-env-vars PRESERVES existing env vars set out-of-band.
      # Secrets (ANTHROPIC_API_KEY, GITHUB_TOKEN, GITHUB_WEBHOOK_SECRET, CRON_SECRET)
      # are configured once via `gcloud run services update --update-env-vars`.
      # NEVER switch to --set-env-vars (it deletes everything not listed here).
      - '--update-env-vars'
      - 'GITHUB_REPO=nicolasbonilla/medical-imaging-viewer,GOOGLE_CLOUD_PROJECT=mstool-ai-qms,QMS_FIREBASE_PROJECT=mstool-ai-qms'

  # Cost guardrail #1: prune old GCR images so storage doesn't accumulate.
  # Keeps the 3 most recent (current + previous + rollback target). Without
  # this, every deploy adds ~250MB to Container Registry storage forever.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        gcloud container images list-tags gcr.io/$PROJECT_ID/mstool-ai-qms \
          --sort-by=~timestamp --format='value(digest)' --limit=999 | tail -n +4 | \
        while read DIGEST; do
          if [ -n "$$DIGEST" ]; then
            gcloud container images delete \
              "gcr.io/$PROJECT_ID/mstool-ai-qms@$$DIGEST" \
              --force-delete-tags --quiet || true
          fi
        done

  # Cost guardrail #2: prune old Cloud Run revisions (keep 2 newest only).
  # Each revision keeps a copy of the spec; safe to delete inactive ones.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        ACTIVE=$(gcloud run services describe mstool-ai-qms \
          --region=us-central1 --format='value(status.latestReadyRevisionName)')
        gcloud run revisions list --service=mstool-ai-qms --region=us-central1 \
          --sort-by=~metadata.creationTimestamp --format='value(metadata.name)' \
          | tail -n +3 | while read REV; do
            if [ -n "$$REV" ] && [ "$$REV" != "$$ACTIVE" ]; then
              gcloud run revisions delete "$$REV" --region=us-central1 --quiet || true
            fi
          done

images:
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'