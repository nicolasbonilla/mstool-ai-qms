steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mstool-ai-qms'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      # CPU is allocated only during request handling (not idle). With
      # min-instances=0 + this flag, idle Cloud Run is essentially $0.
      - '--no-cpu-throttling=false'
      - '--max-instances'
      - '3'
      # SCALE TO ZERO. Cloud Scheduler hits /api/v1/cron/* endpoints to
      # wake the service when needed. APScheduler is INTENTIONALLY OFF
      # in production so we don't need a 24/7 instance. Net savings:
      # ~$45/month vs min-instances=1.
      - '--min-instances'
      - '0'
      # Slightly higher concurrency saves on per-request CPU billing.
      - '--concurrency'
      - '40'
      # IMPORTANT: --update-env-vars preserves any env vars set out-of-band
      # (e.g. ANTHROPIC_API_KEY configured via `gcloud run services update`),
      # which --set-env-vars would silently delete. Bug we shipped twice
      # before finding it — never go back to --set-env-vars here.
      - '--update-env-vars'
      - 'GITHUB_REPO=nicolasbonilla/medical-imaging-viewer,GOOGLE_CLOUD_PROJECT=mstool-ai-qms,QMS_FIREBASE_PROJECT=mstool-ai-qms'

images:
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'