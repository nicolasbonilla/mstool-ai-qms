steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mstool-ai-qms'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '3'
      # min-instances=1 keeps APScheduler alive overnight so the hourly
      # snapshot, daily SOUP scan, and weekly drift canary actually run
      # even if no human opens the app. Cost: ~$10/month vs unbounded
      # reliability win.
      - '--min-instances'
      - '1'
      # IMPORTANT: --update-env-vars preserves any env vars set out-of-band
      # (e.g. ANTHROPIC_API_KEY configured via `gcloud run services update`),
      # which --set-env-vars would silently delete. Bug we shipped twice
      # before finding it — never go back to --set-env-vars here.
      - '--update-env-vars'
      - 'GITHUB_REPO=nicolasbonilla/medical-imaging-viewer,GOOGLE_CLOUD_PROJECT=mstool-ai-qms,QMS_FIREBASE_PROJECT=mstool-ai-qms'

images:
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'