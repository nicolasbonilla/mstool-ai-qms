steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mstool-ai-qms'
      - '--image'
      - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'GITHUB_REPO=nicolasbonilla/medical-imaging-viewer,GOOGLE_CLOUD_PROJECT=mstool-ai-qms'

images:
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mstool-ai-qms:latest'